name: Ejecutar Radar Desregulación Diario

on:
  schedule:
    # Se ejecuta a las 10:00 UTC (07:00 AM Argentina), de lunes a viernes
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  escanear-bora:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el Radar
        env:
          EMAIL_ORIGEN: ${{ secrets.EMAIL_ORIGEN }}
          PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
          # Múltiples destinatarios separados por coma:
          # "correo1@gmail.com,correo2@gmail.com"
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python radar_automatico.py
