name: Ejecutar Radar Desregulación Diario

on:
  schedule:
    # Se ejecuta a las 10:17 UTC (07:17 AM Argentina), de lunes a viernes.
    # Se usa un minuto "raro" (no las :00 en punto) a propósito: el cron de GitHub
    # se congestiona y se saltea/demora en las horas redondas. 10:17 es más confiable.
    - cron: '17 10 * * 1-5'
  workflow_dispatch:

jobs:
  escanear-bora:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el Radar
        env:
          EMAIL_ORIGEN: ${{ secrets.EMAIL_ORIGEN }}
          PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
          # Múltiples destinatarios separados por coma:
          # "correo1@gmail.com,correo2@gmail.com"
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          # Servidor SMTP (opcional). Si no se definen, usa Gmail por defecto.
          # Para GMX: definir la variable SMTP_HOST = mail.gmx.com
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          # --- Fuente de datos ---
          # Cambiar a "google_sheets" cuando esté listo el setup de Google.
          # (Si no se define, el código usa "excel_local" por defecto.)
          FUENTE_DATOS: ${{ vars.FUENTE_DATOS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          # --- Capa de IA (Gemini) ---
          # Activar poniendo la variable USAR_IA = true y cargando el secret GEMINI_API_KEY.
          # GEMINI_MODEL es opcional (por defecto gemini-2.5-flash).
          USAR_IA: ${{ vars.USAR_IA }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: python radar_automatico.py
