name: Keepalive del cron

# GitHub deshabilita los workflows programados (cron) tras 60 días sin actividad
# en el repo. Este job corre cada lunes, refresca un archivo de sello y commitea,
# reseteando el contador para que el Radar no se apague solo.

on:
  schedule:
    - cron: '7 6 * * 1'   # lunes 06:07 UTC (minuto "raro", no las :00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Refrescar sello y commitear
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git config user.name  "keepalive-bot"
          git config user.email "actions@github.com"
          git add .keepalive
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: keepalive del cron [skip ci]"
            git push
          fi
